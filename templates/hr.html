      +'</div>';
    html += '<div style="background:var(--hull-2);border:1px solid var(--bridge-line);border-radius:10px;padding:12px;">'
      +'<div class="small muted" style="margin-bottom:3px;">Alasan Resign</div>'
      +'<div style="font-size:12px;line-height:1.5;color:var(--hr-text);">'+escapeHtml(bg.resignReason||'—')+'</div></div>';
    html += '<div style="background:var(--hull-2);border:2px solid '+rehireCol+';border-radius:10px;padding:12px;text-align:center;min-width:90px;">'
      +'<div class="small muted" style="margin-bottom:3px;">Rehire</div>'
      +'<div style="font-weight:700;font-size:13px;color:'+rehireCol+';">'+rehireIcon+' '+escapeHtml(bg.rehire||'—')+'</div></div>';
    html += '</div>';
    html += '</div>';
  }

  return html;
}

/* ---- Tab: MCU (maritime) ---- */
function hrTabMcu(c){
  let html = hrPipelineStrip(c);
  // MCU hanya muncul setelah interview selesai (sesuai alur canvas)
  if(!c.hr.interview.done){
    return html + `<div class="card"><div class="small muted" style="line-height:1.7;">${icon('info',12)}
      MCU hanya dapat diproses setelah sesi <b>Interview</b> selesai dan dievaluasi.
      Buka tab <b>Interview</b> untuk menandai interview selesai terlebih dahulu.</div></div>`;
  }
  html += `<div class="card">
    <div class="eyebrow" style="margin-bottom:12px;">${icon('shield',12)} Medical Check-Up (MCU)
      <span class="tag tag-hr" style="margin-left:10px;font-size:10px;">${icon('eye',10)} HR Only — Tersembunyi dari Kandidat</span>
    </div>`;
  if(!c.hr.mcu.done){
    html += `<div class="grid-2">
      <div class="field"><label>Tanggal Kadaluarsa MCU</label>
        <input class="input" type="date" id="hr-mcu-exp"
          value="${c.hr.mcu.validUntil?new Date(c.hr.mcu.validUntil).toISOString().slice(0,10):''}">
      </div>
      <div class="field"><label>Status Fit for Duty</label>
        <select class="select" id="hr-mcu-fit">
          <option value="">Pilih...</option>
          <option value="Fit for Duty">Fit for Duty</option>
          <option value="Unfit">Unfit</option>
          <option value="Conditional Fit">Conditional Fit</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <button class="btn btn-primary btn-sm" onclick="hrSaveMcu('${c.id}')">${icon('check',13)} Konfirmasi MCU</button>
      <button class="btn btn-demo btn-sm" onclick="hrDemoSkip('${c.id}','mcu')" title="Demo: isi MCU otomatis — Fit for Duty">⚡ Demo Fit for Duty</button>
    </div>`;
  } else {
    html += `<div class="card-flat" style="display:flex;gap:12px;align-items:center;">
      <span class="tag tag-rule">${icon('shield',11)} MCU Valid</span>
      <span class="small muted">Berlaku s/d ${fmtDate(c.hr.mcu.validUntil)} &nbsp;·&nbsp; ${escapeHtml(c.hr.mcu.fitForDuty||'-')}</span>
    </div>`;
  }
  return html + `</div>`;
}

/* ---- Tab: Keputusan Final & Kontrak ---- */
function hrTabKeputusan(c){
  const isMaritime = c.track==='maritime';
  let html = hrPipelineStrip(c);

  if(!c.hr.final){
    const ready = !!(c.hr.bgCheck.done && (!isMaritime || c.hr.mcu.done));
    const border = ready ? 'var(--green)' : 'var(--line)';
    let notice = '';
    if(!ready){
      const missing = 'Background Check' + (isMaritime ? ' &amp; MCU' : '');
      notice = '<div class="card-flat" style="margin-bottom:14px;background:rgba(200,130,31,.07);border-color:rgba(200,130,31,.2);">'
        +'<div class="small" style="line-height:1.65;">'+icon('info',12)+' Idealnya selesaikan tahap <b>'+missing+'</b> sebelum keputusan final. '
        +'Untuk demo, Anda tetap dapat mengambil keputusan sekarang.</div></div>';
    }
    html += '<div class="card" style="border-left:3px solid '+border+'">'
      +'<div class="eyebrow" style="margin-bottom:12px;">'+icon('award',12)+' Keputusan Final</div>'
      +notice
      +'<div class="field"><label>Catatan untuk Kandidat</label>'
      +'<textarea class="textarea" id="hr-final-notes" style="min-height:66px;" placeholder="Tuliskan catatan keputusan akhir…"></textarea></div>'
      +'<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">'
      +'<button class="btn btn-success btn-sm" onclick="hrSetFinal(\''+c.id+'\',\'hired\')">'+icon('check',13)+' Terima (Hired)</button>'
      +'<button class="btn btn-sm" style="background:rgba(43,179,160,.18);color:var(--teal-dark);" onclick="hrSetFinal(\''+c.id+'\',\'pool\')">'+icon('folder',13)+' Talent Pool</button>'
      +'<button class="btn btn-danger btn-sm" onclick="hrSetFinal(\''+c.id+'\',\'rejected\')">'+icon('x',13)+' Tolak</button>'
      +'<button class="btn btn-demo btn-sm" onclick="hrDemoSkip(\''+c.id+'\',\'final_hire\')" title="Demo: terima kandidat otomatis">⚡ Demo Hired</button>'
      +'</div></div>';

  } else if(c.hr.final==='hired'){
    const contractBtn = c.contractGenerated
      ? '<button class="btn btn-ghost btn-sm" onclick="openContractView(\''+c.id+'\')">'+icon('printer',13)+' Lihat &amp; Cetak Kontrak</button>'
      : '<button class="btn btn-primary btn-sm" onclick="generateContract(\''+c.id+'\')">'+icon('file',13)+' Generate Kontrak PKWT</button>';
    const notesHtml = c.hr.finalNotes
      ? '<div class="card-flat" style="margin-bottom:14px;"><div class="small muted" style="line-height:1.65;">'+escapeHtml(c.hr.finalNotes)+'</div></div>'
      : '';
    html += '<div class="card" style="border-left:4px solid var(--green)">'

/* ---- HR-side certificate verification (RPA trigger; simulated in demo) ---- */
function hrVerifyCert(id){
  const c = CANDIDATES.find(x=>x.id===id); if(!c) return;
  const kode = (c.cv.fields && c.cv.fields.kodePelaut) || c.cert.number || '';
  if(!kode) return;
  STATE.certVerifying = STATE.certVerifying || {};
  STATE.certVerifying[id] = true; renderAll();
  // Panggil endpoint RPA (di produksi menjalankan cert_verifier.py → pelaut.dephub.go.id).
  try{ fetch(`/api/candidates/${id}/verify-cert`, {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'}).catch(()=>{}); }catch(e){}
  setTimeout(()=>{
    if(STATE.certVerifying) delete STATE.certVerifying[id];
    const now = new Date().toISOString();
    const vu = new Date(); vu.setFullYear(vu.getFullYear()+2);
    c.cert = {status:'valid', number:kode, validUntil:vu.toISOString(), verifiedAt:now};
    if(typeof persistCandidate==='function') persistCandidate(id);
    else if(typeof saveCandidateById==='function') saveCandidateById(id);
    renderAll();
  }, 1900);
}

function hrSetStage1(id, action){
  const c = CANDIDATES.find(c=>c.id===id); if(!c) return;
  const notes = (document.getElementById('hr-s1-notes')?.value||'').trim();
  c.hr.stage1   = action==='reject'?'reject':(action==='pool'?'pool':'advance');

  const S = {

      <button class="btn btn-ghost btn-sm" onclick="window.print()">${icon('printer',13)} Cetak</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Tutup</button>
    </div>
  </div>`);
}

/* ============================================================
   LIVE MODE — wiring konsol HR ke backend MAXY
   File ini berfungsi ganda:
     • Sebagai konsol HR LIVE saat di-serve oleh server (membaca/menyimpan via API)
     • Sebagai demo offline mandiri (fallback ke data seed) bila API tak tersedia
   ============================================================ */
const LIVE = false;                // true = HR live (simpan ke server); false = demo mandiri (reset tiap refresh)
const API_BASE = '';               // origin yang sama dengan server

function reviveDoc(c){
  // Pastikan struktur minimum ada agar fungsi render demo tidak error
  c.cv      = c.cv      || {fields:{}, fileName:null};
  c.quiz    = c.quiz    || {answers:{}, passFail:null, qualScore:0};
  c.bundle  = c.bundle  || {};
  c.bundle.story            = c.bundle.story            || '';
  c.bundle.tools            = c.bundle.tools            || [];
  c.bundle.availabilityJoin = c.bundle.availabilityJoin ?? null;
  c.bundle.salaryExpIdr     = c.bundle.salaryExpIdr     ?? null;
  c.bundle.disc             = c.bundle.disc             || {};
  c.bundle.iq               = c.bundle.iq               || {};
  c.bundle.formScore        = c.bundle.formScore        ?? 0;
  c.video   = c.video   || {answers:[], aiScore:0};
  c.video.answers = c.video.answers || [];
  c.cert    = c.cert    || {status:null, number:null, validUntil:null};
  c.hr      = c.hr      || {};
  const h = c.hr;
  h.stage1 = h.stage1 ?? null; h.stage1At = h.stage1At ?? null; h.stage1Notes = h.stage1Notes || '';
  h.interview = h.interview || {scheduledAt:null, mode:'Online', location:'', done:false, eval:{komunikasi:0,teknis:0,sikap:0,notes:''}};
  h.interview.eval = h.interview.eval || {komunikasi:0,teknis:0,sikap:0,notes:''};
  h.bgCheck = h.bgCheck || {done:false};
  h.mcu = h.mcu || {uploaded:false, validUntil:null, fitForDuty:'', done:false};
  h.final = h.final ?? null; h.finalAt = h.finalAt ?? null; h.finalNotes = h.finalNotes || '';
  c.emailLog = c.emailLog || [];
  c.contractGenerated = !!c.contractGenerated;
  return c;
}

async function apiLoadCandidates(){
  const r = await fetch(API_BASE + '/api/candidates');
  if(!r.ok) throw new Error('HTTP '+r.status);
  const data = await r.json();
  return (data.candidates || []).map(reviveDoc);
}

// Simpan dokumen kandidat ke server (debounce agar input beruntun tidak membanjiri).
const _saveTimers = {};
function saveCandidateById(id){
  if(!LIVE) return;
  clearTimeout(_saveTimers[id]);
  _saveTimers[id] = setTimeout(async ()=>{
    const c = CANDIDATES.find(x=>x.id===id);
    if(!c) return;
    try{
      const r = await fetch(API_BASE + '/api/candidates/'+encodeURIComponent(id), {
        method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(c)
      });
      if(!r.ok) throw new Error('HTTP '+r.status);
      const out = await r.json();
      if(out && out.candidate){
        // sinkronkan skor hasil recompute server tanpa mengganggu referensi tampilan
        const i = CANDIDATES.findIndex(x=>x.id===id);
        if(i>=0){ CANDIDATES[i] = reviveDoc(out.candidate); if(STATE.activeId===id) renderAll(); }
      }
    }catch(e){ console.warn('Gagal menyimpan kandidat', id, e); toast('Gagal menyimpan ke server', '', 'info'); }
  }, 450);
}

// Bungkus seluruh aksi HR agar otomatis tersimpan ke server setelah dijalankan.
['hrSetStage1','hrScheduleInterview','hrSendInterviewInvite','hrSetEval','hrFinishInterview',
 'hrSaveBgCheck','hrSaveMcu','hrSetFinal','hrSendNotif'].forEach(name=>{
  const orig = window[name];
  if(typeof orig === 'function'){
    window[name] = function(id){ const r = orig.apply(this, arguments); saveCandidateById(id); return r; };
  }
});

// Generate kontrak: minta server membuat berkas PDF nyata, lalu tandai & simpan.
const _origGenerateContract = window.generateContract;
window.generateContract = function(id){
  const c = CANDIDATES.find(x=>x.id===id); if(!c) return;
  c.contractGenerated = true;
  if(LIVE){
    fetch(API_BASE + '/api/candidates/'+encodeURIComponent(id)+'/contract?fmt=pdf', {method:'POST'})
      .then(r=>r.json()).then(out=>{
        if(out && out.url){ c._contractUrl = out.url; toast('Kontrak PKWT berhasil dibuat!', 'success', 'file'); }
      }).catch(()=>toast('Kontrak ditandai (server tak merespons)', '', 'info'));
    saveCandidateById(id);
  } else {
    toast('Kontrak PKWT berhasil di-generate!', 'success', 'file');
  }
  renderAll();
};

// Unduh kontrak dalam format tertentu (PDF/DOCX) dari server.
function downloadContract(id, fmt){
  if(!LIVE){ toast('Mode demo: unduhan tersedia di server live.', '', 'info'); return; }
  toast('Menyiapkan '+fmt.toUpperCase()+'…', '', 'file');
  fetch(API_BASE + '/api/candidates/'+encodeURIComponent(id)+'/contract?fmt='+fmt, {method:'POST'})
    .then(r=>r.json()).then(out=>{
      if(out && out.url){ window.open(API_BASE + out.url, '_blank'); }
      else toast('Gagal membuat kontrak', '', 'info');
    }).catch(()=>toast('Gagal menghubungi server', '', 'info'));
}

// Tarik pendaftar terbaru dari crewing (tombol manual di header HR bila tersedia).
function pollCrewingNow(){
  toast('Menarik pendaftar baru…', '', 'bars');
  fetch(API_BASE + '/api/poll-crewing', {method:'POST'})
    .then(r=>r.json()).then(out=>{
      toast((out.new||0)+' pendaftar baru ditarik', 'success', 'check');
      bootLive();
    }).catch(()=>toast('Polling gagal', '', 'info'));
}

async function bootLive(){
  if(LIVE){
    try{
      const docs = await apiLoadCandidates();
      CANDIDATES.length = 0;
      docs.forEach(d=>CANDIDATES.push(d));
      if(!CANDIDATES.length){ console.info('Belum ada kandidat di server.'); }
    }catch(e){
      console.warn('API tidak tersedia, memakai data demo:', e);
      if(!CANDIDATES.length) seedCandidates();
    }
  } else {
    seedCandidates();
  }
  // Konsol ini selalu membuka langsung ke papan HR.
  STATE.role = 'hr';
  STATE.view = (STATE.view==='hr-detail') ? 'hr-detail' : 'hr-board';
  renderAll();
}

/* ---- Boot ---- */
bootLive();
// Segarkan daftar kandidat berkala agar pendaftar/asesmen baru muncul otomatis.
if(LIVE){ setInterval(()=>{ if(STATE.role==='hr' && STATE.view==='hr-board'){ apiLoadCandidates().then(docs=>{ if(docs.length!==CANDIDATES.length){ CANDIDATES.length=0; docs.forEach(d=>CANDIDATES.push(d)); renderAll(); } }).catch(()=>{}); } }, 20000); }
</script>
