<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAXY — Sistem Rekrutmen Lintas Maritim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

/* ============================================================
   MAXY DESIGN SYSTEM
   Candidate side  = "Boarding Pass" — pale harbour-fog page,
                      cream ticket card, teal/amber/red signal lights.
   HR side         = "Bridge Console" — dark hull navy, radar-style
                      panels, mono readouts.
   ============================================================ */

:root{
  /* ---- candidate (light / "harbour") ---- */
  --page-bg:#EEF3F5;
  --ticket:#FBF6EA;
  --card:#FFFFFF;
  --ink:#16222B;
  --ink-soft:#56666F;
  --ink-faint:#8B98A1;
  --line:#DCE3E6;
  --line-soft:#E8EDEF;

  /* ---- hr (dark / "bridge") ---- */
  --hull:#0C2233;
  --hull-2:#0A1C2B;
  --bridge:#14304A;
  --bridge-2:#1C3E5C;
  --bridge-line:#28496A;
  --hr-text:#E7EEF2;
  --hr-text-soft:#93A6B3;

  /* ---- signal colours (shared meaning both sides) ---- */
  --teal:#168E7F;
  --teal-light:#E3F3F0;
  --teal-dark:#2BB3A0;
  --amber:#C8821F;
  --amber-light:#FBF0DE;
  --amber-dark:#EAAE4F;
  --red:#BF4A3D;
  --red-light:#FBEAE7;
  --red-dark:#E1685A;
  --green:#3C8C4A;
  --green-light:#E7F4E9;
  --green-dark:#57B868;
  --gold:#A87B2C;
  --gold-light:#F6EEDC;

  --font-display:'Fraunces', serif;
  --font-head:'Space Grotesk', sans-serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;

  --radius-s:6px;
  --radius-m:10px;
  --radius-l:16px;
  --shadow-s:0 1px 2px rgba(16,30,40,.06), 0 1px 1px rgba(16,30,40,.04);
  --shadow-m:0 6px 20px rgba(16,30,40,.10), 0 2px 6px rgba(16,30,40,.06);
  --shadow-l:0 16px 40px rgba(8,16,24,.18);
}

*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--page-bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
body.theme-hr{ background:var(--hull); color:var(--hr-text); }

h1,h2,h3,h4{ font-family:var(--font-head); margin:0; letter-spacing:-0.01em; }
p{ margin:0; }
button{ font-family:var(--font-body); }
input,select,textarea{ font-family:var(--font-body); }
a{ color:inherit; }
::selection{ background:var(--teal); color:#fff; }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
}

/* ---------------- layout shells ---------------- */
.topbar{
  position:sticky; top:0; z-index:40;
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 28px;
  background:var(--card); border-bottom:1px solid var(--line);
}
body.theme-hr .topbar{ background:var(--hull-2); border-bottom:1px solid var(--bridge-line); }

.brand{ display:flex; align-items:center; gap:10px; }
.brand-mark{
  width:34px; height:34px; border-radius:9px;
  background:linear-gradient(155deg, var(--teal), #0e5f54);
  display:flex; align-items:center; justify-content:center;
  flex:none;
}
.brand-word{ font-family:var(--font-display); font-weight:600; font-size:21px; letter-spacing:0.01em; }
.brand-sub{ font-size:11px; color:var(--ink-faint); font-family:var(--font-mono); letter-spacing:.02em; margin-top:-2px;}
body.theme-hr .brand-sub{ color:var(--hr-text-soft); }

.role-switch{ display:flex; gap:4px; background:var(--page-bg); padding:4px; border-radius:99px; border:1px solid var(--line); }
body.theme-hr .role-switch{ background:var(--hull-2); border-color:var(--bridge-line); }
.role-switch button{
  border:none; background:transparent; cursor:pointer;
  padding:8px 16px; border-radius:99px; font-size:13px; font-weight:600;
  color:var(--ink-soft); display:flex; align-items:center; gap:7px;
  transition:background .15s, color .15s;
}
body.theme-hr .role-switch button{ color:var(--hr-text-soft); }
.role-switch button.active{ background:var(--ink); color:#fff; }
body.theme-hr .role-switch button.active{ background:var(--teal-dark); color:#06201c; }

.shell{ max-width:1180px; margin:0 auto; padding:36px 28px 80px; }
.shell.narrow{ max-width:760px; }

/* ---------------- typography helpers ---------------- */
.eyebrow{
  font-family:var(--font-mono); font-size:11px; letter-spacing:.09em; text-transform:uppercase;
  color:var(--teal); font-weight:600;
}
body.theme-hr .eyebrow{ color:var(--teal-dark); }
.h1{ font-size:32px; line-height:1.15; font-weight:600; }
.h2{ font-size:22px; line-height:1.25; font-weight:600; }
.h3{ font-size:16px; line-height:1.3; font-weight:600; }
.muted{ color:var(--ink-soft); }
body.theme-hr .muted{ color:var(--hr-text-soft); }
.small{ font-size:13px; }
.mono{ font-family:var(--font-mono); }

/* ---------------- buttons ---------------- */
.btn{
  appearance:none; border:none; cursor:pointer; font-weight:600; font-size:14px;
  padding:11px 20px; border-radius:99px; display:inline-flex; align-items:center; gap:8px;
  transition:transform .12s ease, box-shadow .12s ease, background .15s, opacity .15s;
  white-space:nowrap;
}
.btn:active{ transform:scale(.97); }
.btn-primary{ background:var(--ink); color:#fff; }
.btn-primary:hover{ background:#26343f; }
body.theme-hr .btn-primary{ background:var(--teal-dark); color:#06201c; }
body.theme-hr .btn-primary:hover{ background:#39c4b0; }
.btn-teal{ background:var(--teal); color:#fff; }
.btn-teal:hover{ box-shadow:var(--shadow-m); }
.btn-ghost{ background:transparent; color:var(--ink); border:1px solid var(--line); }
body.theme-hr .btn-ghost{ color:var(--hr-text); border-color:var(--bridge-line); }
.btn-ghost:hover{ background:var(--line-soft); }
body.theme-hr .btn-ghost:hover{ background:var(--bridge); }
.btn-danger{ background:var(--red-light); color:var(--red); }
body.theme-hr .btn-danger{ background:rgba(225,104,90,.15); color:var(--red-dark); }
.btn-danger:hover{ background:#f6d8d3; }
.btn-success{ background:var(--green-light); color:var(--green); }
body.theme-hr .btn-success{ background:rgba(87,184,104,.15); color:var(--green-dark); }
.btn-block{ width:100%; justify-content:center; }
.btn-sm{ padding:7px 14px; font-size:12.5px; }
.btn:disabled{ opacity:.45; cursor:not-allowed; }
.btn-icon{ width:38px; height:38px; padding:0; border-radius:50%; justify-content:center; }
.btn-demo{ background:transparent; color:var(--hr-text-soft); border:1.5px dashed var(--bridge-line); font-size:12px; padding:8px 12px; }
.btn-demo:hover{ border-color:var(--amber-dark); color:var(--amber-dark); }

/* ---------------- badges / tags ---------------- */
.tag{
  display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700;
  padding:4px 10px; border-radius:99px; letter-spacing:.02em; font-family:var(--font-mono);
  text-transform:uppercase;
}
.tag-ai{ background:var(--teal-light); color:var(--teal); }
body.theme-hr .tag-ai{ background:rgba(43,179,160,.16); color:var(--teal-dark); }
.tag-rule{ background:var(--green-light); color:var(--green); }
body.theme-hr .tag-rule{ background:rgba(87,184,104,.16); color:var(--green-dark); }
.tag-hr{ background:var(--amber-light); color:var(--amber); }
body.theme-hr .tag-hr{ background:rgba(234,174,79,.18); color:var(--amber-dark); }
.tag-auto{ background:var(--line-soft); color:var(--ink-soft); }
body.theme-hr .tag-auto{ background:var(--bridge-2); color:var(--hr-text-soft); }
.tag-red{ background:var(--red-light); color:var(--red); }
body.theme-hr .tag-red{ background:rgba(225,104,90,.16); color:var(--red-dark); }

.pill{
  display:inline-flex; align-items:center; gap:6px;
  padding:5px 12px; border-radius:99px; font-size:12.5px; font-weight:600;
  border:1px solid var(--line); color:var(--ink-soft);
}
body.theme-hr .pill{ border-color:var(--bridge-line); color:var(--hr-text-soft); }
.pill.on{ background:var(--ink); color:#fff; border-color:var(--ink); }
body.theme-hr .pill.on{ background:var(--teal-dark); color:#06201c; border-color:var(--teal-dark); }

/* ---------------- card ---------------- */
.card{
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius-l);
  padding:24px; box-shadow:var(--shadow-s);
}
body.theme-hr .card{ background:var(--bridge); border-color:var(--bridge-line); box-shadow:none; }
.card + .card{ margin-top:16px; }
.card-flat{ background:var(--page-bg); border:1px solid var(--line-soft); border-radius:var(--radius-m); padding:16px; }
body.theme-hr .card-flat{ background:var(--hull-2); border-color:var(--bridge-line); }

.row{ display:flex; gap:16px; }
.col{ flex:1; min-width:0; }
.grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.grid-3{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
@media (max-width:720px){ .grid-2,.grid-3,.row{ grid-template-columns:1fr; flex-direction:column; } }

/* ---------------- forms ---------------- */
.field{ margin-bottom:16px; }
.field label{ display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:7px; }
body.theme-hr .field label{ color:var(--hr-text-soft); }
.field .hint{ font-size:11.5px; color:var(--ink-faint); margin-top:5px; }
.input,.select,.textarea{
  width:100%; padding:11px 13px; border-radius:var(--radius-s); border:1px solid var(--line);
  background:var(--card); color:var(--ink); font-size:14px; outline:none;
  transition:border-color .15s, box-shadow .15s;
}
body.theme-hr .input, body.theme-hr .select, body.theme-hr .textarea{
  background:var(--hull-2); border-color:var(--bridge-line); color:var(--hr-text);
}
.input:focus,.select:focus,.textarea:focus{ border-color:var(--teal); box-shadow:0 0 0 3px var(--teal-light); }
body.theme-hr .input:focus, body.theme-hr .select:focus, body.theme-hr .textarea:focus{ box-shadow:0 0 0 3px rgba(43,179,160,.18); }
.textarea{ resize:vertical; min-height:90px; }
.choice-group{ display:flex; flex-wrap:wrap; gap:8px; }
.choice{
  padding:9px 15px; border-radius:99px; border:1px solid var(--line); cursor:pointer;
  font-size:13.5px; font-weight:600; color:var(--ink-soft); background:var(--card);
  transition:all .12s;
}
body.theme-hr .choice{ background:var(--hull-2); border-color:var(--bridge-line); color:var(--hr-text-soft); }
.choice.selected{ background:var(--ink); color:#fff; border-color:var(--ink); }
body.theme-hr .choice.selected{ background:var(--teal-dark); color:#06201c; border-color:var(--teal-dark); }
.file-drop{
  border:1.5px dashed var(--line); border-radius:var(--radius-m); padding:26px; text-align:center;
  cursor:pointer; transition:border-color .15s, background .15s;
}
.file-drop:hover{ border-color:var(--teal); background:var(--teal-light); }
body.theme-hr .file-drop{ border-color:var(--bridge-line); }

/* ---------------- BOARDING PASS STEPPER (signature element) ---------------- */
.ticket{
  position:relative; background:var(--ticket); border-radius:18px;
  display:flex; box-shadow:var(--shadow-m); overflow:visible; margin-bottom:28px;
  border:1px solid #ECE2C6;
}
.ticket-main{ flex:1; padding:20px 22px; position:relative; }
.ticket-stub{
  width:128px; flex:none; padding:20px 14px; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:6px; position:relative; text-align:center;
}
.ticket-perf{
  width:0; border-left:2px dashed #D9CCA0; position:relative; flex:none; margin:14px 0;
}
.ticket-perf::before,.ticket-perf::after{
  content:''; position:absolute; left:50%; width:22px; height:22px; background:var(--page-bg);
  border-radius:50%; transform:translateX(-50%);
}
.ticket-perf::before{ top:-31px; }
.ticket-perf::after{ bottom:-31px; }
.ticket-route{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.ticket-route .city{ font-family:var(--font-mono); font-size:20px; font-weight:600; letter-spacing:.03em; }
.ticket-route .arrow{ flex:1; height:1px; background:repeating-linear-gradient(90deg,#C7B98A 0 6px,transparent 6px 11px); position:relative; }
.ticket-route .arrow::after{ content:'⚓'; position:absolute; right:0; top:-9px; font-size:13px; }
.ticket-label{ font-family:var(--font-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:#9C8B57; }
.ticket-stub .ticket-label{ color:#9C8B57; }
.ticket-stub .big{ font-family:var(--font-mono); font-size:26px; font-weight:600; color:var(--ink); }

.stepline{ display:flex; align-items:flex-start; gap:0; }
.step{ flex:1; display:flex; flex-direction:column; align-items:center; position:relative; gap:8px; min-width:0; }
.step .dot{
  width:30px; height:30px; border-radius:50%; background:var(--card); border:2px solid var(--line);
  display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:12px; font-weight:600;
  color:var(--ink-faint); z-index:2; flex:none;
}
.step .bar{ position:absolute; top:15px; left:-50%; width:100%; height:2px; background:var(--line); z-index:1; }
.step:first-child .bar{ display:none; }
.step .lbl{ font-size:10.5px; font-weight:600; text-align:center; color:var(--ink-faint); line-height:1.25; padding:0 2px; }
.step.done .dot{ background:var(--teal); border-color:var(--teal); color:#fff; }
.step.done .bar{ background:var(--teal); }
.step.done .lbl{ color:var(--ink-soft); }
.step.current .dot{ background:var(--ink); border-color:var(--ink); color:#fff; box-shadow:0 0 0 4px var(--teal-light); }
.step.current .lbl{ color:var(--ink); font-weight:700; }

/* stamp (cert verified / passed) */
.stamp{
  display:inline-flex; align-items:center; gap:8px; border:2.5px solid currentColor; border-radius:10px;
  padding:8px 14px; transform:rotate(-3deg); font-family:var(--font-mono); font-weight:700; font-size:12.5px;
  letter-spacing:.06em; text-transform:uppercase; color:var(--green);
}
.stamp.fail{ color:var(--red); }

/* ---------------- progress / score bars ---------------- */
.barline{ display:flex; align-items:center; gap:12px; margin-bottom:11px; }
.barline .lbl{ width:128px; flex:none; font-size:12.5px; font-weight:600; color:var(--ink-soft); }
body.theme-hr .barline .lbl{ color:var(--hr-text-soft); }
.barline .track{ flex:1; height:8px; border-radius:99px; background:var(--line-soft); overflow:hidden; }
body.theme-hr .barline .track{ background:var(--hull-2); }
.barline .fill{ height:100%; border-radius:99px; }
.barline .val{ width:38px; flex:none; text-align:right; font-family:var(--font-mono); font-size:12.5px; font-weight:600; }

.gauge-wrap{ display:flex; align-items:center; gap:20px; }
.gauge-num{ font-family:var(--font-mono); font-size:34px; font-weight:600; }

/* ---------------- stage processing animation ---------------- */
.scanner{
  display:flex; align-items:center; gap:14px; padding:18px; border-radius:var(--radius-m);
  background:var(--teal-light); color:var(--teal); font-weight:600; font-size:13.5px;
}
body.theme-hr .scanner{ background:rgba(43,179,160,.12); color:var(--teal-dark); }
.spin{ width:18px; height:18px; border-radius:50%; border:2.5px solid currentColor; border-top-color:transparent; animation:spin .8s linear infinite; flex:none;}
@keyframes spin{ to{ transform:rotate(360deg); } }
.dotflash span{ animation:flash 1.2s infinite; }
.dotflash span:nth-child(2){ animation-delay:.2s; }
.dotflash span:nth-child(3){ animation-delay:.4s; }
@keyframes flash{ 0%,80%,100%{ opacity:.25; } 40%{ opacity:1; } }

/* ---------------- kanban (HR) ---------------- */
.kanban{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; align-items:start; }
@media (max-width:980px){ .kanban{ grid-template-columns:1fr; } }
.kcol{ background:var(--hull-2); border:1px solid var(--bridge-line); border-radius:var(--radius-l); padding:14px; min-height:200px; }
.kcol-head{ display:flex; align-items:center; justify-content:space-between; padding:4px 6px 14px; }
.kcol-head .t{ font-weight:700; font-size:13px; }
.kcol-head .n{ font-family:var(--font-mono); font-size:12px; color:var(--hr-text-soft); background:var(--bridge-2); padding:2px 8px; border-radius:99px;}
.kcard{
  background:var(--bridge); border:1px solid var(--bridge-line); border-radius:var(--radius-m); padding:14px;
  margin-bottom:10px; cursor:pointer; transition:transform .12s, border-color .12s;
}
.kcard:hover{ border-color:var(--teal-dark); transform:translateY(-2px); }
.kcard .name{ font-weight:700; font-size:14px; margin-bottom:3px; }
.kcard .pos{ font-size:12px; color:var(--hr-text-soft); margin-bottom:10px; }
.kcard .meta{ display:flex; align-items:center; justify-content:space-between; }
.kcard .score{ font-family:var(--font-mono); font-weight:700; font-size:15px; }

/* ---------------- tabs ---------------- */
.tabs{ display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:20px; overflow-x:auto; }
body.theme-hr .tabs{ border-color:var(--bridge-line); }
.tab{
  padding:10px 16px; font-size:13px; font-weight:600; color:var(--ink-faint); cursor:pointer;
  border-bottom:2px solid transparent; white-space:nowrap; display:flex; align-items:center; gap:6px;
}
body.theme-hr .tab{ color:var(--hr-text-soft); }
.tab.active{ color:var(--ink); border-bottom-color:var(--teal); }
body.theme-hr .tab.active{ color:var(--hr-text); border-bottom-color:var(--teal-dark); }

/* ---------------- avatar ---------------- */
.avatar{
  width:44px; height:44px; border-radius:50%; background:var(--bridge-2); color:var(--hr-text);
  display:flex; align-items:center; justify-content:center; font-weight:700; font-family:var(--font-head);
  flex:none; font-size:15px;
}
.avatar.lg{ width:60px; height:60px; font-size:19px; }

/* ---------------- toast ---------------- */
#toast-root{ position:fixed; bottom:22px; right:22px; z-index:200; display:flex; flex-direction:column; gap:10px; align-items:flex-end; }
.toast{
  background:var(--ink); color:#fff; padding:13px 18px; border-radius:11px; box-shadow:var(--shadow-l);
  font-size:13.5px; font-weight:600; display:flex; align-items:center; gap:10px; max-width:360px;
  animation:toastin .25s ease;
}
.toast.success{ background:#1d4d36; }
.toast.info{ background:#143a52; }
@keyframes toastin{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:translateY(0); } }

/* ---------------- modal ---------------- */
#modal-root{ position:fixed; inset:0; z-index:150; display:none; align-items:center; justify-content:center; padding:24px; }
#modal-root.open{ display:flex; }
.modal-backdrop{ position:absolute; inset:0; background:rgba(10,18,26,.55); backdrop-filter:blur(2px); }
.modal-box{
  position:relative; background:var(--card); border-radius:18px; max-width:540px; width:100%;
  max-height:86vh; overflow-y:auto; padding:0; box-shadow:var(--shadow-l); animation:modalin .2s ease;
}
@keyframes modalin{ from{ opacity:0; transform:translateY(10px) scale(.98); } to{ opacity:1; transform:translateY(0) scale(1); } }
.modal-head{ display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--line); }
.modal-body{ padding:22px; }
.modal-close{ width:30px; height:30px; border-radius:50%; border:none; background:var(--line-soft); cursor:pointer; display:flex; align-items:center; justify-content:center; }

/* email envelope mock */
.envelope{ border:1px solid var(--line); border-radius:var(--radius-m); overflow:hidden; }
.envelope-head{ background:var(--page-bg); padding:14px 16px; border-bottom:1px solid var(--line); font-size:12.5px; }
.envelope-head .r{ display:flex; gap:8px; margin-bottom:3px; }
.envelope-head .k{ color:var(--ink-faint); width:46px; flex:none; }
.envelope-body{ padding:18px 16px; font-size:13.5px; line-height:1.6; }
.envelope-cta{ display:inline-block; margin-top:12px; background:var(--ink); color:#fff; padding:10px 18px; border-radius:8px; font-weight:600; font-size:13px; text-decoration:none; }

/* video interview uses GDrive URL input — no camera CSS needed */

/* ---------------- misc ---------------- */
.divider{ height:1px; background:var(--line); margin:18px 0; border:none; }
body.theme-hr .divider{ background:var(--bridge-line); }
.flex-between{ display:flex; align-items:center; justify-content:space-between; }
.icon{ display:inline-flex; flex:none; }
.checklist-row{ display:flex; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line-soft); }
body.theme-hr .checklist-row{ border-color:var(--bridge-line); }
.checklist-row:last-child{ border-bottom:none; }
.ckbox{
  width:22px; height:22px; border-radius:6px; border:2px solid var(--line); flex:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all .12s;
}
body.theme-hr .ckbox{ border-color:var(--bridge-line); }
.ckbox.checked{ background:var(--teal); border-color:var(--teal); color:#fff; }

function calcCvMatchMaritime(job, f){
  let score=50;
  score += f.expYears>=job.minExp ? 20 : Math.max(0,20-(job.minExp-f.expYears)*8);
  score += (!job.gtMin || f.gt>=job.gtMin) ? 10 : 4;
  score += (!job.ocimf || f.ocimf) ? 10 : -4;
  const have = f.certs||[];
  const matched = job.certsRequired.filter(c=>have.includes(c)).length;
  score += (matched/job.certsRequired.length)*10;
  return Math.round(clamp(score,0,100));
}
function calcCvMatchBackoffice(job, f){
  let score=45;
  const rank={'SMA/SMK':1,'D3':2,'S1':3,'S2':4};
  score += rank[f.edu]>=rank[job.eduMin] ? 18 : -8;
  score += (f.age>=job.minAge && f.age<=job.maxAge) ? 12 : -4;
  score += f.expYears>=job.minExp ? 15 : Math.max(0,15-(job.minExp-f.expYears)*6);
  const have=f.tools||[];
  const matched=job.toolsRequired.filter(t=>have.includes(t)).length;
  score += (matched/job.toolsRequired.length)*10;
  return Math.round(clamp(score,0,100));
}
function calcQualScoreMaritime(job, ans){
  const gatesPass = ans.q1==='Ya' && ans.q4==='Ya' && (ans._expYears===undefined || ans._expYears>=job.minExp);
  let score = gatesPass ? 50 : 15;
  const avail = {'Segera (≤1 minggu)':25,'2 minggu':20,'1 bulan':12,'Lebih dari 1 bulan':5}[ans.q2] || 10;
  score += avail;
  const salaryNum = Number(ans.q3)||0;
  if(salaryNum<=job.salaryMaxUsd) score+=25; else if(salaryNum<=job.salaryMaxUsd*1.1) score+=15; else score+=5;
  return {passFail:gatesPass, score:Math.round(clamp(score,0,100))};
}
function calcDisc(answers){
  const tally={D:0,I:0,S:0,C:0};
  Object.values(answers).forEach(k=>{ if(tally[k]!==undefined) tally[k]++; });
  let type='S', max=-1;
  Object.keys(tally).forEach(k=>{ if(tally[k]>max){ max=tally[k]; type=k; } });
  const fitScore = 72 + max*6;
  return {tally, type, label:DISC_LABEL[type], fitScore:Math.round(clamp(fitScore,0,98))};
}
function calcIq(answers){
  let correct=0;
  IQ_QUESTIONS.forEach(q=>{ if(answers[q.id]===q.answer) correct++; });
  const score = 40 + correct*20;
  return {correct, total:IQ_QUESTIONS.length, score:clamp(score,0,100)};
}
function calcFormScore(bundle, job){
  let s=15;
  if((bundle.story||'').trim().length>40) s+=18; else if((bundle.story||'').trim().length>0) s+=8;
  if((bundle.tools||[]).length>=2) s+=17; else if((bundle.tools||[]).length===1) s+=8;
  const avail = {'Segera (≤1 minggu)':25,'2 minggu':20,'1 bulan':12,'Lebih dari 1 bulan':5}[bundle.availabilityJoin]||10;
  s += avail;
  const salary = bundle.salaryExpIdr||0;
  if(job && salary){
    const maxIdr = job.salaryMaxIdr||0;
    if(maxIdr){ s += salary<=maxIdr?25:(salary<=maxIdr*1.1?15:5); } else s+=10;
  } else s+=10;
  return Math.round(clamp(s,0,100));
}
function certSubscore(status){ return {valid:100, expired:45, error:60, not_found:15}[status] ?? 50; }

function recompute(c){
  if(c.track==='maritime'){

  } else {
    c.composite = Math.round((c.cv.matchScore||0)*0.25 + (c.bundle.disc.fitScore||0)*0.20 + (c.bundle.iq.score||0)*0.15 + (c.video.aiScore||0)*0.25 + (c.bundle.formScore||0)*0.15);
  }
}

/* ---------------- core utils ---------------- */
function $(id){ return document.getElementById(id); }
function escapeHtml(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function toast(msg, type, icoName){
  const root = $('toast-root');
  const el = document.createElement('div');
  el.className = 'toast'+(type?(' '+type):'');
  el.innerHTML = (icoName?icon(icoName,16):'') + '<span>'+msg+'</span>';
  root.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .3s'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 3600);
}

function openModal(html){
  $('modal-box').innerHTML = html;
  $('modal-root').classList.add('open');
}
function closeModal(){ $('modal-root').classList.remove('open'); $('modal-box').innerHTML=''; }

function setRole(role){
  STATE.role = role;
  STATE.view = role==='candidate' ? 'landing' : 'hr-board';
  document.body.className = role==='hr' ? 'theme-hr' : '';
  renderAll();
  window.scrollTo(0,0);
}

function nav(view, params){
  STATE.view = view;
  if(params) Object.assign(STATE, params);
  renderAll();
  window.scrollTo(0,0);
}

function renderAll(){
  renderTopbar();
  $('app').innerHTML = renderView();
}

function delayThen(ms, fn){ setTimeout(fn, ms); }

/* ============================================================
   PART 3 — TOPBAR, ROUTER, SHARED RENDER HELPERS
   ============================================================ */

function renderTopbar(){
  $('topbar').innerHTML = `
    <div class="topbar">
      <a href="/" style="display:flex;align-items:center;gap:6px;text-decoration:none;color:var(--hr-text-soft);font-size:12px;font-family:var(--font-mono);border:1px solid var(--bridge-line);border-radius:99px;padding:5px 12px;background:var(--hull-2);flex-shrink:0;margin-right:8px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
        Demo Home
      </a>
      <div class="brand" style="cursor:pointer" onclick="nav('hr-board')">
        <div class="brand-mark">${icon('anchor',18)}</div>
        <div>
          <div class="brand-word">MAXY</div>
          <div class="brand-sub">LINTAS MARITIM &middot; HR CONSOLE</div>
        </div>
      </div>
    </div>`;
  document.title = 'MAXY — Bridge Console (HR)';
}

function activeCandidate(){ return CANDIDATES.find(c=>c.id===STATE.activeId) || null; }

function renderView(){
  try{
    if(STATE.role==='hr'){
      return STATE.view==='hr-detail' ? renderHrDetail() : renderHrBoard();
    }
    switch(STATE.view){
      case 'landing': return renderLanding();
      case 'jobs': return renderJobs();
      case 'apply': return renderApply();
      case 'processing': return renderProcessing();
      case 'stageA': return renderStageA();
      case 'stageB': return renderStageB();
      case 'stageC': return renderStageC();
      case 'stageD': return renderStageD();
      case 'complete': return renderComplete();
      case 'inbox': return renderInbox();
      default: return renderLanding();
    }
  }catch(err){
    console.error(err);
    return '<div class="empty">'+icon('info',34)+'<div class="h3" style="margin-top:12px;">Terjadi kendala menampilkan halaman ini</div><p class="muted small" style="margin-top:6px;">'+escapeHtml(err.message)+'</p><button class="btn btn-primary" style="margin-top:18px;" onclick="nav(\'landing\')">Kembali ke Beranda</button></div>';
  }
}

/* ---- small shared atoms ---- */
function trackTag(track){
  return track==='maritime'
    ? '<span class="tag" style="background:var(--teal-light);color:var(--teal)">'+icon('anchor',11)+' Maritime Crew</span>'
    : '<span class="tag" style="background:#EDE9FE;color:#6D4FC2">'+icon('building',11)+' Back Office</span>';
}
function stageTag(t,label){
  const map = {ai:'tag-ai', rule:'tag-rule', hr:'tag-hr', auto:'tag-auto'};
  const ic = {ai:'sparkle', rule:'check', hr:'user', auto:'bars'}[t];
  return '<span class="tag '+(map[t]||'tag-auto')+'">'+icon(ic,11)+' '+label+'</span>';
}
function scoreColor(n){ return n>=80?'var(--green)':(n>=60?'var(--amber)':'var(--red)'); }
function initials(name){
  if(!name) return '?';
  const p = name.trim().split(/\s+/);
  return (p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();
}
function fmtSeconds(n){ n=Math.round(n||0); const m=Math.floor(n/60), s=n%60; return m? (m+':'+String(s).padStart(2,'0')) : (s+'s'); }

function renderStepline(steps, currentIndex){
  return '<div class="stepline">'+steps.map((s,i)=>{
    let cls='step'+(i<currentIndex?' done':(i===currentIndex?' current':''));
    const dot = i<currentIndex ? icon('check',14) : (i+1);
    return '<div class="'+cls+'"><span class="bar"></span><div class="dot">'+dot+'</div><div class="lbl">'+escapeHtml(s)+'</div></div>';
  }).join('')+'</div>';
}
function renderPipeline(steps){
  return '<div class="stepline">'+steps.map(s=>{
    let cls='step'+(s.status==='done'?' done':(s.status==='current'?' current':''));
    const dot = s.status==='done'?icon('check',14):(s.status==='current'?icon('clock',13):'&middot;');
    return '<div class="'+cls+'"><span class="bar"></span><div class="dot">'+dot+'</div><div class="lbl">'+escapeHtml(s.label)+'</div></div>';
  }).join('')+'</div>';
}
function renderTicketHeader(c, currentIndex, stub){
  const steps = c.track==='maritime' ? MARITIME_STEPS : BACKOFFICE_STEPS;
  return `<div class="ticket">
    <div class="ticket-main">
      <div class="ticket-route">
        <span class="city">${escapeHtml((c.name||'KANDIDAT').toUpperCase())}</span>
        <span class="arrow"></span>
        <span class="city">${escapeHtml(c.jobTitle.toUpperCase())}</span>
      </div>
      ${renderStepline(steps, currentIndex)}
    </div>
    <div class="ticket-perf"></div>
    <div class="ticket-stub">
      <div class="ticket-label">${stub?stub.label:'TAHAP'}</div>
      <div class="big">${stub?stub.value:(currentIndex+1)+'/'+steps.length}</div>
      <div class="ticket-label" style="font-size:9px;">${escapeHtml(c.jobId.toUpperCase())}</div>
    </div>
  </div>`;
}
function weightCaption(weights){ return weights.map(([label,,w])=>escapeHtml(label)+' '+Math.round(w*100)+'%').join(' &middot; '); }
function renderScoreBars(weights, subscores){
  return weights.map(([label,key,w,color])=>{
    const val = Math.round(subscores[key]||0);
    return `<div class="barline">
      <div class="lbl">${escapeHtml(label)}</div>
      <div class="track"><div class="fill" style="width:${val}%;background:${color}"></div></div>
      <div class="val">${val}</div>
    </div>`;
  }).join('');
}
function subscoresFor(c){
  if(c.track==='maritime') return { cv:c.cv.matchScore, video:c.video.aiScore, quiz:c.quiz.qualScore, cert:certSubscore(c.cert.status) };
  return { cv:c.cv.matchScore, personality:c.bundle.disc.fitScore, iq:c.bundle.iq.score, video:c.video.aiScore, form:c.bundle.formScore };
}

function aiInsight(c){
  const pros=[], cons=[];
  if(c.cv.matchScore>=78) pros.push('Kecocokan CV tinggi terhadap requirement posisi ('+c.cv.matchScore+'/100).');
  else if(c.cv.matchScore<60) cons.push('Kecocokan CV di bawah rata-rata terhadap requirement posisi ('+c.cv.matchScore+'/100).');
  if(c.video.aiScore>=82) pros.push('Komunikasi & kepercayaan diri sangat baik pada video interview.');
  else if(c.video.aiScore>0 && c.video.aiScore<65) cons.push('Skor analisis komunikasi pada video interview relatif rendah.');
  if(c.track==='maritime'){
    if(c.quiz.passFail===false) cons.push('Tidak memenuhi salah satu syarat mutlak pada Kuis Kualifikasi.');
    if(c.quiz.passFail===true) pros.push('Memenuhi seluruh syarat mutlak (gate) pada Kuis Kualifikasi.');
    if(c.cert.status==='valid') pros.push('Sertifikat pelaut terverifikasi AKTIF di pelaut.dephub.go.id.');
    if(c.cert.status==='expired') cons.push('Sertifikat pelaut sudah KADALUARSA — perlu pembaruan sebelum onboarding.');
    if(c.cert.status==='not_found') cons.push('Nomor sertifikat tidak ditemukan pada database Kemenhub — perlu verifikasi manual.');
    if(c.cert.status==='error') cons.push('Verifikasi sertifikat gagal karena gangguan jaringan — perlu dicoba ulang.');
    const job=jobById(c.jobId); const salary=Number(c.quiz.answers.q3)||0;
    if(salary>job.salaryMaxUsd) cons.push('Ekspektasi gaji (USD '+salary+') di atas budget posisi (maks USD '+job.salaryMaxUsd+').');
  } else {
    if(c.bundle.disc.type) pros.push('Profil DISC dominan: '+c.bundle.disc.label+'.');
    if(c.bundle.iq.score<55) cons.push('Skor tes IQ di bawah ambang yang disarankan untuk posisi ini.');
    if((c.bundle.tools||[]).length>=2) pros.push('Menguasai lebih dari satu tools yang relevan dengan posisi.');
  }
  if(pros.length===0) pros.push('Profil memenuhi syarat dasar untuk posisi ini.');
  if(cons.length===0) cons.push('Tidak ada catatan signifikan dari sistem.');
  return {pros, cons};
}

function buildPipeline(c){
  const isMaritime = c.track==='maritime';
  const interviewLabel = isMaritime ? 'Interview HR & User' : 'Interview User/Manager';
  const stage1Done = c.hr.stage1!=null;
  const earlyEnd = !!c.hr.final && c.hr.stage1!=='advance';
  const steps=[{label:'Asesmen Mandiri', status:'done'}];
  steps.push({label:'Review HR', status: stage1Done?'done':'current'});
  if(earlyEnd){
    steps.push({label:interviewLabel, status:'skip'});
    steps.push({label:'Background Check', status:'skip'});
    if(isMaritime) steps.push({label:'Medical Check-Up', status:'skip'});
    steps.push({label:'Keputusan Final', status:'done'});
    return steps;
  }
  if(!stage1Done){
    steps.push({label:interviewLabel, status:'upcoming'});
    steps.push({label:'Background Check', status:'upcoming'});
    if(isMaritime) steps.push({label:'Medical Check-Up', status:'upcoming'});
    steps.push({label:'Keputusan Final', status:'upcoming'});
    return steps;
  }
  steps.push({label:interviewLabel, status: c.hr.interview.done?'done':'current'});
  steps.push({label:'Background Check', status: !c.hr.interview.done?'upcoming':(c.hr.bgCheck.done?'done':'current')});
  if(isMaritime){
    steps.push({label:'Medical Check-Up', status: !c.hr.bgCheck.done?'upcoming':(c.hr.mcu.done?'done':'current')});
    steps.push({label:'Keputusan Final', status: c.hr.final?'done':(c.hr.mcu.done?'current':'upcoming')});
  } else {
    steps.push({label:'Keputusan Final', status: c.hr.final?'done':(c.hr.bgCheck.done?'current':'upcoming')});
  }
  return steps;
}

function statusMessage(c){
  const isMaritime = c.track==='maritime';
  if(c.hr.final==='hired') return {tone:'success', title:'Selamat! Anda Diterima', body:'Tim HR telah memutuskan untuk melanjutkan proses onboarding Anda. Kontrak kerja (PKWT) telah diterbitkan — silakan periksa bagian Dokumen Kontrak di bawah.'};
  if(c.hr.final==='rejected') return {tone:'danger', title:'Lamaran Belum Berhasil Kali Ini', body:'Setelah melalui seluruh tahapan penilaian, tim HR memutuskan untuk tidak melanjutkan lamaran Anda pada posisi ini. Terima kasih atas waktu Anda — profil tetap kami simpan untuk peluang mendatang.'};
  if(c.hr.final==='pool') return {tone:'warn', title:'Anda Masuk Talent Pool', body:'Profil Anda dinilai potensial, namun belum ada posisi yang cocok saat ini. Kami akan menghubungi Anda lebih dulu saat ada lowongan yang sesuai.'};
  if(!c.hr.stage1) return {tone:'info', title:'Sedang Ditinjau Tim HR', body:'Seluruh hasil asesmen mandiri Anda sudah lengkap & sedang ditinjau oleh recruiter kami. Estimasi waktu review 2–3 hari kerja.'};
  if(!c.hr.interview.done){
    if(c.hr.interview.scheduledAt) return {tone:'info', title:'Interview Telah Dijadwalkan', body:'Selamat, Anda lolos tahap screening awal. Interview dijadwalkan pada '+fmtDateTime(c.hr.interview.scheduledAt)+' via '+c.hr.interview.mode+(c.hr.interview.location?' ('+c.hr.interview.location+')':'')+'.'};
    return {tone:'info', title:'Lolos Tahap Screening Awal', body:'Tim HR akan segera menghubungi Anda untuk menjadwalkan sesi interview.'};
  }
  if(!c.hr.bgCheck.done) return {tone:'info', title:'Interview Selesai', body:'Tim HR sedang melakukan pengecekan latar belakang & referensi kerja Anda.'};
  if(isMaritime && !c.hr.mcu.done) return {tone:'info', title:'Pengecekan Latar Belakang Selesai', body:'Mohon siapkan & unggah hasil Medical Check-Up (MCU) terbaru Anda yang masih berlaku saat dihubungi HR.'};
  return {tone:'info', title:'Seluruh Tahapan Selesai', body:'Keputusan akhir sedang difinalisasi oleh tim HR. Anda akan menerima notifikasi segera setelah keputusan diambil.'};
}
function toneColor(t){ return {success:'var(--green)', danger:'var(--red)', warn:'var(--amber)', info:'var(--teal)'}[t]||'var(--teal)'; }
function toneBg(t){ return {success:'var(--green-light)', danger:'var(--red-light)', warn:'var(--amber-light)', info:'var(--teal-light)'}[t]||'var(--teal-light)'; }

</script>

function cvReviewBackoffice(c){

      <div class="flex-between"><div><div class="h3">${icon('shield',16)} Tahap D — Verifikasi Sertifikat Pelaut</div><p class="small muted" style="margin-top:4px;">Pengecekan otomatis ke Kemenhub (pelaut.dephub.go.id) via RPA Vision.</p></div>${stageTag('auto','Auto')}</div>
      <div class="divider"></div>${body}
    </div>
  </div>`;
}
function runCertCheck(scenario){
  STATE.draft.certStep='running'; STATE.draft.certTick=1; STATE.draft.certResult=scenario;
  STATE.draft.certNumber='PLT-'+Math.floor(1000+Math.random()*8999)+'-'+Math.floor(1000+Math.random()*8999);
  renderAll();
  delayThen(550, ()=>{ STATE.draft.certTick=2; renderAll(); });
  delayThen(1100, ()=>{ STATE.draft.certTick=3; renderAll(); });
  delayThen(1700, ()=>{ STATE.draft.certStep='done'; renderAll(); });
}
function confirmCertCheck(){
  const c=activeCandidate();
  const validUntil = STATE.draft.certResult==='valid' ? daysAgo(-400) : (STATE.draft.certResult==='expired' ? daysAgo(20) : null);
  c.cert = { status:STATE.draft.certResult, number: STATE.draft.certResult==='not_found'?null:STATE.draft.certNumber, validUntil };
  finishSelfServe(c);
  nav('complete');
}

/* ---------------- Complete / Status / Inbox ---------------- */
function renderComplete(){
  const c=activeCandidate(); if(!c) return emptyNoCandidate();
  const sub=subscoresFor(c), weights=c.track==='maritime'?MARITIME_WEIGHTS:BACKOFFICE_WEIGHTS, msg=statusMessage(c), pipeline=buildPipeline(c);
  return `<div style="max-width:720px;margin:0 auto;">
    <div class="ticket">
      <div class="ticket-main">
        <div class="ticket-route"><span class="city">${escapeHtml((c.name||'KANDIDAT').toUpperCase())}</span><span class="arrow"></span><span class="city">${escapeHtml(c.jobTitle.toUpperCase())}</span></div>
        ${renderPipeline(pipeline)}
      </div>
      <div class="ticket-perf"></div>
      <div class="ticket-stub"><div class="ticket-label">SKOR KOMPOSIT</div><div class="big">${c.composite}</div><div class="ticket-label" style="font-size:9px;">${escapeHtml(c.jobId.toUpperCase())}</div></div>
    </div>
    <div class="card" style="border-left:4px solid ${toneColor(msg.tone)};background:${toneBg(msg.tone)};">
      <div style="font-weight:700;font-size:15px;color:${toneColor(msg.tone)};">${escapeHtml(msg.title)}</div>
      <p class="small" style="margin-top:6px;line-height:1.6;color:var(--ink);">${escapeHtml(msg.body)}</p>
      ${c.hr.final==='hired' ? (c.contractGenerated ? `<button class="btn btn-primary btn-sm" style="margin-top:14px;" onclick="openContractView('${c.id}')">${icon('printer',14)} Lihat Dokumen Kontrak</button>` : `<p class="small" style="margin-top:10px;color:var(--ink-soft);">${icon('clock',12)} Kontrak kerja (PKWT) sedang disiapkan tim HR.</p>`) : ''}
    </div>
    <div class="card">
      <div class="h3">${icon('bars',15)} Rincian Skor Komposit</div>
      <p class="small muted" style="margin-top:4px;">Bobot: ${weightCaption(weights)}</p>
      <div style="margin-top:16px;">${renderScoreBars(weights,sub)}</div>
    </div>
    <div class="card">
      <div class="flex-between"><div class="h3">${icon('mail',15)} Riwayat Notifikasi</div><span class="small muted">${c.emailLog.length} pesan</span></div>
      <div style="margin-top:14px;display:flex;flex-direction:column;gap:10px;">${c.emailLog.slice().reverse().slice(0,3).map(emailMini).join('')}</div>
      ${c.emailLog.length>3 ? `<button class="btn btn-ghost btn-sm" style="margin-top:12px;" onclick="nav('inbox')">Lihat semua notifikasi</button>` : ''}
    </div>
    <div style="text-align:center;margin-top:8px;"><button class="btn btn-ghost btn-sm" onclick="nav('landing')">${iconBack(13)} Kembali ke Beranda</button></div>
  </div>`;
}
function emailMini(e){
  return `<div class="envelope"><div class="envelope-head"><div class="r"><span class="k">Dari</span><span>MAXY &middot; Lintas Maritim</span></div><div class="r"><span class="k">Subjek</span><span style="font-weight:600;">${escapeHtml(e.subject)}</span></div></div>
  <div class="envelope-body" style="font-size:12.5px;padding:12px 16px;white-space:pre-wrap;line-height:1.65;">${escapeHtml(e.body)}<div class="small muted" style="margin-top:8px;white-space:normal;">${fmtDateTime(e.sentAt)} &middot; ${escapeHtml(e.channel||'Email & WhatsApp')}</div></div></div>`;
}
function renderInbox(){
  const c=activeCandidate(); if(!c) return emptyNoCandidate();
  return `<div style="max-width:600px;margin:0 auto;">
    <button class="btn btn-ghost btn-sm" onclick="nav('complete')">${iconBack(14)} Kembali ke Status</button>
    <div class="eyebrow" style="margin-top:18px;">${icon('mail',12)} Kotak Masuk</div>
    <h1 class="h1" style="margin-top:8px;font-size:24px;">Riwayat Notifikasi Anda</h1>
    <div style="margin-top:20px;display:flex;flex-direction:column;gap:12px;">${c.emailLog.slice().reverse().map(emailMini).join('') || `<div class="empty">${icon('mail',30)}<div class="small" style="margin-top:8px;">Belum ada notifikasi.</div></div>`}</div>
  </div>`;
}

</script>

<script>
/* ============================================================
   PART 5 — HR CONSOLE: Board, Detail, Actions, Contract
   ============================================================ */

/* ---- HR Board ---- */
function renderHrBoard(){
  const COLS = {
    screening:{ label:'Asesmen Berlangsung', color:'var(--hr-text-soft)' },
    review:   { label:'Review HR',           color:'var(--amber-dark)'   },
    interview:{ label:'Interview',            color:'var(--teal-dark)'    },
    decision: { label:'Keputusan Final',      color:'var(--green-dark)'   }
  };

  const filtered = CANDIDATES.filter(c => {
    const matchTrack  = STATE.hrFilter==='all' || c.track===STATE.hrFilter;

    const matchSearch = !q || c.name.toLowerCase().includes(q) || c.jobTitle.toLowerCase().includes(q);
    return matchTrack && matchSearch;
  });

  const grouped = { screening:[], review:[], interview:[], decision:[] };
  filtered.forEach(c => grouped[hrColumn(c)].push(c));

  const total    = CANDIDATES.length;
  const hired    = CANDIDATES.filter(c=>c.hr.final==='hired').length;

  return `<div>
    <div class="flex-between" style="margin-bottom:20px;flex-wrap:wrap;gap:12px;">
      <div>
        <div class="eyebrow">${icon('grid',12)} Bridge Console · Manajemen Kandidat</div>
        <div class="h2" style="margin-top:6px;">Rekrutmen Dashboard</div>

        <input class="input" style="width:190px;padding:8px 12px;font-size:13px;" placeholder="Cari nama / posisi…"
          value="${escapeHtml(STATE.hrSearch||'')}" oninput="STATE.hrSearch=this.value;renderAll()">
        ${['all','maritime','backoffice'].map(f=>`
          <button class="btn btn-sm ${STATE.hrFilter===f?'btn-primary':'btn-ghost'}"
            onclick="STATE.hrFilter='${f}';renderAll()">
            ${f==='all'?'Semua':(f==='maritime'?icon('anchor',12)+' Maritime':icon('building',12)+' Back Office')}
          </button>`).join('')}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;">
      <div class="card-flat" style="text-align:center;">
        <div class="mono" style="font-size:26px;font-weight:700;">${total}</div>
        <div class="small muted">Total Kandidat</div>
      </div>
      <div class="card-flat" style="text-align:center;">
        <div class="mono" style="font-size:26px;font-weight:700;color:var(--amber-dark);">${needRev}</div>
        <div class="small muted">Perlu Review HR</div>
      </div>
      <div class="card-flat" style="text-align:center;">
        <div class="mono" style="font-size:26px;font-weight:700;color:var(--green-dark);">${hired}</div>
        <div class="small muted">Diterima (Hired)</div>
      </div>
      <div class="card-flat" style="text-align:center;">
        <div class="mono" style="font-size:26px;font-weight:700;">${avgScore}</div>
        <div class="small muted">Rata-rata Skor</div>
      </div>
    </div>

    <div class="kanban">
      ${Object.entries(COLS).map(([key,col])=>`
        <div class="kcol">
          <div class="kcol-head">
            <span class="t" style="color:${col.color}">${col.label}</span>
            <span class="n">${grouped[key].length}</span>
          </div>
          ${grouped[key].length===0
            ? `<div class="empty" style="padding:28px 10px;font-size:12px;">${icon('info',20)}<div style="margin-top:8px;">Kosong</div></div>`
            : grouped[key].map(renderKcard).join('')}
        </div>`).join('')}
    </div>
  </div>`;
}

function renderKcard(c){
  const rec = aiRecommendation(c.composite);
  let statusBadge;
  if(c.hr.final==='hired')    statusBadge = `<span class="tag tag-rule" style="font-size:9px;">${icon('check',9)} Hired</span>`;
  else if(c.hr.final==='pool') statusBadge = `<span class="tag tag-ai"  style="font-size:9px;">${icon('folder',9)} Pool</span>`;
  else if(c.hr.final)          statusBadge = `<span class="tag tag-red"  style="font-size:9px;">${icon('x',9)} Rejected</span>`;
  else                         statusBadge = `<span class="tag ${rec.cls}" style="font-size:9px;">${rec.label}</span>`;

  return `<div class="kcard" onclick="nav('hr-detail',{hrOpenId:'${c.id}',hrDetailTab:'profil'})">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
      <div class="avatar" style="width:34px;height:34px;font-size:12px;background:var(--bridge-2);">${initials(c.name)}</div>
      <div style="flex:1;min-width:0;">
        <div class="name" style="font-size:13px;">${escapeHtml(c.name)}</div>
        <div class="pos">${escapeHtml(c.jobTitle)}</div>
      </div>
    </div>
    <div class="meta">
      ${statusBadge}
      <span class="score" style="color:${scoreColor(c.composite)}">${c.composite}</span>
    </div>
    <div style="margin-top:8px;font-size:10.5px;color:var(--hr-text-soft);">
      ${fmtDate(c.appliedAt)} &middot; ${c.track==='maritime'?icon('anchor',10)+' Mar':icon('building',10)+' BO'}
    </div>
  </div>`;
}

/* ---- HR Detail — Shell ---- */
function renderHrDetail(){
  const c = CANDIDATES.find(c=>c.id===STATE.hrOpenId);
  if(!c) return `<div class="empty">${icon('info',30)}
    <div class="h3" style="margin-top:12px;">Kandidat tidak ditemukan</div>
    <button class="btn btn-ghost" style="margin-top:16px;" onclick="nav('hr-board')">Kembali</button></div>`;

  const t   = STATE.hrDetailTab || 'profil';
  const isMar = c.track==='maritime';
  const tabs = [
    { id:'profil',     label:icon('user',14)+' Profil'       },
    { id:'screening',  label:icon('bars',14)+' Scoring'      },
    { id:'sertifikat', label:icon('shield',14)+' Sertifikat', hide:!isMar },
    { id:'video',      label:icon('video',14)+' Video',  hide:!c.video.answers.length },
    { id:'interview',  label:icon('calendar',14)+' Interview' },
    { id:'bgcheck',    label:icon('search',14)+' Background' },
    { id:'mcu',        label:icon('shield',14)+' MCU',   hide:!isMar },
    { id:'keputusan',  label:icon('award',14)+' Keputusan' },
    { id:'komunikasi', label:icon('mail',14)+' Komunikasi'   },
  ];

  let body = '';
  if(t==='profil')         body = hrTabProfil(c);
  else if(t==='screening') body = hrTabScreening(c);
  else if(t==='sertifikat')body = hrTabCert(c);
  else if(t==='video')     body = hrTabVideo(c);
  else if(t==='interview') body = hrTabInterview(c);
  else if(t==='bgcheck')   body = hrTabBgCheck(c);
  else if(t==='mcu')       body = hrTabMcu(c);
  else if(t==='keputusan') body = hrTabKeputusan(c);
  else if(t==='komunikasi')body = hrTabKomunikasi(c);
  else body = hrTabProfil(c);

  return `<div>
    <div class="flex-between" style="margin-bottom:18px;flex-wrap:wrap;gap:12px;">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="btn btn-ghost btn-sm" onclick="nav('hr-board')">${iconBack(14)} Board</button>
        <div class="avatar lg">${initials(c.name)}</div>
        <div>
          <div class="h2">${escapeHtml(c.name)}</div>
          <div class="small muted" style="margin-top:2px;">
            ${escapeHtml(c.jobTitle)} &middot;
            ${c.track==='maritime'?icon('anchor',11)+' Maritime':icon('building',11)+' Back Office'} &middot;
            Daftar ${fmtDate(c.appliedAt)}
          </div>
        </div>
      </div>
      <div style="text-align:right;">
        <div class="mono" style="font-size:32px;font-weight:700;color:${scoreColor(c.composite)}">${c.composite}</div>
        <div class="small muted">Composite Score</div>
      </div>
    </div>

    <div class="tabs" style="margin-bottom:20px;">
      ${tabs.filter(tb=>!tb.hide).map(tb=>`
        <div class="tab${t===tb.id?' active':''}" onclick="STATE.hrDetailTab='${tb.id}';renderAll()">
          ${tb.label}
        </div>`).join('')}
    </div>

    ${body}
  </div>`;
}

/* ---- Helpers untuk Profil tab ---- */
function candidateAsmProgress(c){
  const steps = [];
  steps.push({label:'CV Screening', done:!!c.cv.fileName, score:c.cv.fileName?c.cv.matchScore:null, extra:c.cv.fileName?('Match: '+c.cv.matchScore+'/100'):''});
  if(c.track==='maritime'){
    const qDone = c.quiz.passFail!==null;
    steps.push({label:'Kuis Kualifikasi', done:qDone, score:qDone?c.quiz.qualScore:null, extra:qDone?(c.quiz.passFail?'Pass — syarat mutlak terpenuhi':'Fail — ada syarat yang tidak terpenuhi'):''});
    steps.push({label:'Video Interview', done:c.video.aiScore>0, score:c.video.aiScore>0?c.video.aiScore:null, extra:c.video.aiScore>0?(c.video.answers.length+' jawaban terekam'):''});
    steps.push({label:'Verifikasi Sertifikat', done:!!c.cert.status, score:null, extra:c.cert.status?({valid:'Valid ✓',expired:'Kadaluarsa',not_found:'Tidak Ditemukan',error:'Error Jaringan'}[c.cert.status]||c.cert.status):''});
  } else {
    const formDone = !!(c.bundle.disc&&c.bundle.disc.type);
    steps.push({label:'Form + DISC + IQ', done:formDone, score:formDone?c.bundle.formScore:null,
      extra:formDone?('DISC: '+(c.bundle.disc.type||'?')+' · IQ: '+(c.bundle.iq&&c.bundle.iq.score!=null?c.bundle.iq.score:'?')):''});
    steps.push({label:'Video Interview', done:c.video.aiScore>0, score:c.video.aiScore>0?c.video.aiScore:null, extra:c.video.aiScore>0?(c.video.answers.length+' jawaban terekam'):''});
  }
  return steps;
}

function hrNextAction(c){
  if(!c.selfServeDone) return {title:'Menunggu Kandidat', desc:'Kandidat belum menyelesaikan seluruh tahapan asesmen mandiri.'};
  if(!c.hr.stage1) return {title:'Review Profil & Ambil Keputusan', desc:'Kandidat selesai asesmen. Tinjau scoring, video, dan insight AI lalu putuskan: Lanjut Interview / Talent Pool / Tolak.', tab:'profil', tabLabel:'Profil'};
  if(c.hr.stage1!=='advance') return null;
  if(!c.hr.interview.scheduledAt) return {title:'Jadwalkan Interview', desc:'Kandidat lolos review awal. Jadwalkan sesi interview HR & User sekarang.', tab:'interview', tabLabel:'Interview'};
  if(!c.hr.interview.done) return {title:'Isi Evaluasi Interview', desc:'Interview sudah dijadwalkan. Setelah sesi selesai, isi formulir evaluasi komunikasi, teknis, dan sikap.', tab:'interview', tabLabel:'Interview'};
  if(!c.hr.bgCheck.done) return {title:'Lakukan Background Check', desc:'Hubungi referensi kandidat dan isi hasil pengecekan latar belakang.', tab:'bgcheck', tabLabel:'Background'};
  if(c.track==='maritime' && !c.hr.mcu.done) return {title:'Konfirmasi MCU', desc:'Background check selesai. Minta kandidat upload hasil Medical Check-Up (MCU) terbaru.', tab:'mcu', tabLabel:'MCU'};
  if(!c.hr.final) return {title:'Ambil Keputusan Final', desc:'Semua tahap selesai. Putuskan: Terima (Hired), Talent Pool, atau Tolak — lalu generate kontrak jika diterima.', tab:'keputusan', tabLabel:'Keputusan'};
  if(c.hr.final==='hired' && !c.contractGenerated) return {title:'Generate Kontrak PKWT', desc:'Kandidat diterima. Buat dan kirim dokumen kontrak (PKWT).', tab:'keputusan', tabLabel:'Keputusan'};
  return null;
}

/* ---- Tab: Profil ---- */
function hrTabProfil(c){
  const rec = aiRecommendation(c.composite);
  const ins = aiInsight(c);
  const asmSteps = candidateAsmProgress(c);
  const nextAction = hrNextAction(c);
  const isMar = c.track === 'maritime';

  // --- Blok Aksi HR (full-width, paling atas) ---
  let aksiBlock = '';
  if(!c.selfServeDone){
    aksiBlock = `<div class="card" style="margin-bottom:16px;border-left:4px solid var(--amber-dark);background:var(--amber-light);">
      <div style="display:flex;align-items:center;gap:12px;">
        <div>${icon('clock',20)}</div>
        <div>
          <div style="font-weight:700;font-size:14px;">Menunggu Kandidat Selesai Asesmen</div>
          <div class="small muted" style="margin-top:3px;">Kandidat belum menyelesaikan seluruh tahapan asesmen mandiri. Tidak ada aksi HR yang diperlukan saat ini.</div>
        </div>
      </div>
    </div>`;
  } else if(!c.hr.stage1){
    aksiBlock = `<div class="card" style="margin-bottom:16px;border:2px solid var(--teal-dark);">
      <div class="eyebrow" style="margin-bottom:14px;color:var(--teal-dark);">${icon('user',13)} Keputusan HR — Tahap 1 (Wajib Diisi)</div>
      <p class="small" style="margin-bottom:14px;line-height:1.65;color:var(--ink-soft);">
        Kandidat telah menyelesaikan asesmen mandiri. Tinjau profil di bawah, lalu ambil keputusan:
      </p>
      <div class="field" style="margin-bottom:12px;"><label>Catatan Recruiter (opsional)</label>
        <textarea class="textarea" id="hr-s1-notes" style="min-height:56px;" placeholder="Tulis catatan internal untuk rekam jejak keputusan…">${escapeHtml(c.hr.stage1Notes||'')}</textarea>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <button class="btn btn-success btn-sm" onclick="hrSetStage1('${c.id}','advance')">${icon('check',13)} Lanjut ke Interview</button>
        <button class="btn btn-sm" style="background:rgba(43,179,160,.18);color:var(--teal-dark);border:1px solid rgba(43,179,160,.3);" onclick="hrSetStage1('${c.id}','pool')">${icon('folder',13)} Simpan ke Talent Pool</button>
        <button class="btn btn-danger btn-sm" onclick="hrSetStage1('${c.id}','reject')">${icon('x',13)} Tidak Lanjut</button>
        <button class="btn btn-demo btn-sm" style="margin-left:auto;" onclick="hrDemoSkip('${c.id}','stage1')" title="Demo: otomatis lanjut interview">⚡ Demo</button>
      </div>
    </div>`;
  } else if(nextAction){
    aksiBlock = `<div class="card" style="margin-bottom:16px;border-left:3px solid var(--amber-dark);">
      <div class="eyebrow" style="margin-bottom:6px;color:var(--amber-dark);">${icon('clock',12)} Aksi Selanjutnya</div>
      <div style="font-weight:700;font-size:14px;margin-bottom:4px;">${escapeHtml(nextAction.title)}</div>
      <div class="small muted" style="line-height:1.6;">${escapeHtml(nextAction.desc)}</div>
      ${nextAction.tab?`<button class="btn btn-primary btn-sm" style="margin-top:12px;" onclick="STATE.hrDetailTab='${nextAction.tab}';renderAll();">${icon('chev',13)} Buka Tab ${escapeHtml(nextAction.tabLabel||nextAction.tab)}</button>`:''}
    </div>`;
  } else {
    // keputusan sudah final
    const fc = c.hr.stage1==='advance'?'var(--teal)':c.hr.stage1==='pool'?'var(--amber)':'var(--red)';
    aksiBlock = `<div class="card" style="margin-bottom:16px;border-left:3px solid ${fc};">
      <div class="small muted">Keputusan Tahap 1 · ${fmtDate(c.hr.stage1At)}</div>
      <div style="font-weight:700;margin-top:3px;">${c.hr.stage1==='advance'?'✓ Lanjut Interview':c.hr.stage1==='pool'?'⊙ Talent Pool':'✕ Tidak Dilanjutkan'}</div>
      ${c.hr.stage1Notes?`<div class="small muted" style="margin-top:5px;">${escapeHtml(c.hr.stage1Notes)}</div>`:''}
    </div>`;
  }

  // --- Skor & progress (full-width) ---
  const scoreBlock = `<div class="card" style="margin-bottom:16px;">
    <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
      <div style="text-align:center;flex:none;">
        <div class="gauge-num" style="color:${scoreColor(c.composite)};font-size:44px;">${c.composite}</div>
        <div class="small muted">Composite Score</div>
        <div style="margin-top:6px;"><span class="tag ${rec.cls}">${icon('sparkle',10)} ${rec.label}</span></div>
      </div>
      <div style="flex:1;min-width:180px;">${renderScoreBars(isMar?MARITIME_WEIGHTS:BACKOFFICE_WEIGHTS, subscoresFor(c))}</div>
    </div>
  </div>`;

  // --- Progress Asesmen ---
  const asmBlock = `<div class="card" style="margin-bottom:16px;">
    <div class="eyebrow" style="margin-bottom:12px;">${icon('bars',12)} Progres Asesmen Mandiri</div>
    ${asmSteps.map(s=>`
      <div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--bridge-line);">
        <div style="width:22px;height:22px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;${s.done?'background:var(--teal-dark);color:#fff;':'background:var(--bridge-2);color:var(--hr-text-soft);'}">
          ${s.done?icon('check',12):'<span style="font-size:10px;">–</span>'}
        </div>
        <div style="flex:1;">
          <div class="small" style="font-weight:600;${s.done?'':'color:var(--hr-text-soft);'}">${escapeHtml(s.label)}</div>
          ${s.extra?`<div style="font-size:11px;color:var(--hr-text-soft);margin-top:1px;">${escapeHtml(s.extra)}</div>`:''}
        </div>

/* ---- Tab: Verifikasi Sertifikat (HR-side RPA, maritime) ---- */
function hrTabCert(c){
  const kode = (c.cv.fields && c.cv.fields.kodePelaut) || c.cert.number || '';
  const verifying = STATE.certVerifying && STATE.certVerifying[c.id];
  const certMap   = {valid:'tag-rule',expired:'tag-red',not_found:'tag-red',error:'tag-hr'};
  const certLabel = {valid:'Valid ✓',expired:'Kadaluarsa',not_found:'Tidak Ditemukan',error:'Error Jaringan'};

  // AGEN BERGERAK SENDIRI: begitu kandidat menyelesaikan asesmen, sistem otomatis
  // menjalankan verifikasi. HR tidak memicunya — HR hanya meninjau (ACC) hasilnya.
  const queued = !c.cert.status && !verifying && kode && (c.selfServeDone || c.cert.auto);
  if(queued && !(STATE.certAuto && STATE.certAuto[c.id])){
    STATE.certAuto = STATE.certAuto || {};
    STATE.certAuto[c.id] = true;
    setTimeout(()=>hrVerifyCert(c.id), 500);   // dijalankan sistem, bukan klik HR
  }

  let panel;
  if(verifying || (queued)){
    panel = `<div class="card-flat" style="display:flex;gap:14px;align-items:center;">
      <span class="spin" style="width:22px;height:22px;color:var(--teal-dark);"></span>
      <div>
        <div style="font-weight:600;">Sistem menjalankan verifikasi otomatis…</div>
        <div class="small muted" style="margin-top:3px;">Membuka portal Kemenhub (RPA) · AI Vision membaca &amp; mengisi CAPTCHA · submit kode pelaut.</div>
      </div>
    </div>`;
  } else if(c.cert.status){
    panel = `<div class="card-flat">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px;">
        <span class="tag ${certMap[c.cert.status]||'tag-auto'}">${certLabel[c.cert.status]||c.cert.status}</span>
        ${c.cert.number?`<span class="mono small">${escapeHtml(c.cert.number)}</span>`:''}
        ${c.cert.validUntil?`<span class="small muted">berlaku s/d ${fmtDate(c.cert.validUntil)}</span>`:''}
      </div>
      <div class="small muted" style="margin-bottom:10px;">${icon('sparkle',11)} Diverifikasi otomatis oleh sistem${c.cert.verifiedAt?' · '+fmtDateTime(c.cert.verifiedAt):''} · ${icon('eye',11)} screenshot bukti tersimpan</div>
      <button class="btn btn-ghost btn-sm" onclick="hrVerifyCert('${c.id}')">${icon('search',13)} Jalankan Ulang</button>
    </div>`;
  } else {
    panel = `<div class="card-flat">
      <div class="small muted" style="line-height:1.7;">
        Verifikasi berjalan otomatis setelah kandidat menyelesaikan asesmen mandiri.
        ${kode?'':'<br><b>Kode pelaut tidak tersedia</b> pada data pendaftaran kandidat.'}
      </div>
    </div>`;
  }

  return `${hrPipelineStrip(c)}
    <div class="card">
      <div class="eyebrow" style="margin-bottom:12px;">${icon('shield',12)} Verifikasi Sertifikat Pelaut — Kemenhub <span class="tag tag-auto" style="margin-left:8px;">${icon('sparkle',10)} Otomatis (Sistem)</span></div>
      <div class="grid-2" style="margin-bottom:14px;">
        <div class="small"><div class="muted">Kode Pelaut</div><div class="mono" style="font-weight:600;">${escapeHtml(kode||'—')}</div></div>
        <div class="small"><div class="muted">Sumber</div><div style="font-weight:600;">Data pendaftaran (crewing.lintasmaritim.com)</div></div>
      </div>
      ${panel}
      <div class="small muted" style="margin-top:12px;line-height:1.6;">
        ${icon('info',11)} Dijalankan sistem (agen) — bukan tugas HR. Kandidat tidak melihat alurnya; di portal kandidat hanya tampil “Tahap Analisa HR”. HR cukup melakukan <b>ACC</b> pada keputusan.
      </div>
    </div>`;
}

  html += '<div class="card">';
  html += '<div class="eyebrow" style="margin-bottom:14px;">'+icon('calendar',12)+' Interview '+(isMaritime?'HR &amp; User':'User / Manager')+'</div>';

  if(!iv.done){
    // Status banner
    if(iv.scheduledAt){
      html += '<div class="card-flat" style="margin-bottom:16px;background:rgba(43,179,160,.07);border-color:rgba(43,179,160,.25);">'
        +'<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">'
        +'<div style="flex:1;"><div style="font-weight:700;font-size:14px;margin-bottom:3px;">'+icon('calendar',13)+' Dijadwalkan: '+fmtDateTime(iv.scheduledAt)+'</div>'
        +'<div class="small muted">Mode: '+escapeHtml(iv.mode)+(iv.location?' &nbsp;·&nbsp; '+escapeHtml(iv.location):'')+'</div></div>'

        +'</div></div>';
    } else {
      html += '<div class="card-flat" style="margin-bottom:16px;background:rgba(200,130,31,.07);border-color:rgba(200,130,31,.2);">'
        +'<div class="small" style="line-height:1.65;">'+icon('info',12)+' Interview belum dijadwalkan. '
        +'Isi form di bawah, simpan jadwal, lalu kirim undangan resmi ke kandidat.</div></div>';
    }

    // Schedule form
    html += '<div class="grid-2" style="margin-bottom:14px;">'
      +'<div class="field"><label>Tanggal &amp; Waktu Interview</label>'
      +'<input class="input" type="datetime-local" id="hr-int-date" value="'+(iv.scheduledAt?new Date(iv.scheduledAt).toISOString().slice(0,16):'')+'">'
      +'</div>'
      +'<div class="field"><label>Mode Pelaksanaan</label>'
      +'<select class="select" id="hr-int-mode">'
      +'<option value="Online"'+(iv.mode==='Online'?' selected':'')+'>Online (Video Call)</option>'
      +'<option value="Offline"'+(iv.mode==='Offline'?' selected':'')+'>Offline (Tatap Muka)</option>'
      +'</select></div>'
      +'<div class="field" style="grid-column:span 2"><label>Lokasi / Link Meeting</label>'
      +'<input class="input" id="hr-int-loc" placeholder="misal: Google Meet, Zoom, atau Alamat Kantor" value="'+escapeHtml(iv.location||'')+'">'
      +'</div></div>';

    html += '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:'+(iv.scheduledAt?'20':'0')+'px;">'
      +'<button class="btn btn-primary btn-sm" onclick="hrScheduleInterview(\''+c.id+'\')">'+icon('calendar',13)+' '+(iv.scheduledAt?'Perbarui Jadwal':'Simpan &amp; Jadwalkan')+'</button>'

      +'</div>';

    // Evaluation form (only shown once scheduled)
    if(iv.scheduledAt){
      html += '<div class="divider" style="margin:16px 0;"></div>'
        +'<div class="eyebrow" style="margin-bottom:10px;">'+icon('bars',12)+' Formulir Evaluasi Interview</div>'
        +'<div class="card-flat" style="margin-bottom:14px;background:rgba(200,130,31,.05);border-color:rgba(200,130,31,.15);">'
        +'<div class="small muted">Isi setelah sesi interview selesai. Evaluasi ini bersifat internal — tidak terlihat oleh kandidat.</div></div>';

      const evalDesc = {komunikasi:'kemampuan menyampaikan & mendengarkan', teknis:'pemahaman & pengetahuan teknis', sikap:'profesionalisme & kesesuaian budaya'};
      ['komunikasi','teknis','sikap'].forEach(k=>{
        html += '<div class="field" style="margin-bottom:14px;">'
          +'<label>'+k.charAt(0).toUpperCase()+k.slice(1)+' (1 – 5) '
          +'<span class="small muted" style="font-weight:400;font-size:11px;">— '+evalDesc[k]+'</span></label>'
          +'<div class="choice-group">'
          +[1,2,3,4,5].map(v=>'<div class="choice'+(iv.eval[k]===v?' selected':'')+'" onclick="hrSetEval(\''+c.id+'\',\''+k+'\','+v+')">'+v+'</div>').join('')
          +'</div></div>';
      });

      html += '<div class="field" style="margin-bottom:14px;"><label>Catatan Interview</label>'
        +'<textarea class="textarea" id="hr-int-notes" style="min-height:80px;" placeholder="Ringkasan observasi: kelebihan, catatan, hal yang perlu dipertimbangkan...">'+escapeHtml(iv.eval.notes||'')+'</textarea></div>'
        +'<button class="btn btn-success btn-sm" onclick="hrFinishInterview(\''+c.id+'\')">'+icon('check',13)+' Tandai Interview Selesai &amp; Simpan Evaluasi</button>';
    }
  } else {
    // Interview done — visual results
    html += '<div class="card-flat" style="display:flex;align-items:center;gap:10px;margin-bottom:16px;background:var(--green-light);border-color:rgba(60,140,74,.2);">'
      +'<span class="tag tag-rule">'+icon('check',11)+' Interview Selesai</span>'
      +'<span class="small muted">'+fmtDateTime(iv.scheduledAt)+' &nbsp;·&nbsp; '+escapeHtml(iv.mode)+(iv.location?' &nbsp;·&nbsp; '+escapeHtml(iv.location):'')+'</span>'
      +'</div>';

    html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;">';
    const scoreLabels = {komunikasi:'Komunikasi', teknis:'Teknis', sikap:'Sikap'};
    ['komunikasi','teknis','sikap'].forEach(k=>{
      const score = iv.eval[k]||0;
      html += '<div style="text-align:center;padding:16px 10px;background:var(--hull-2);border-radius:10px;border:1px solid var(--bridge-line);">'
        +'<div class="mono" style="font-size:32px;font-weight:700;color:'+scoreColor(score*20)+'">'+score+'</div>'
        +'<div style="font-size:11px;color:var(--hr-text-soft);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-top:5px;">'+scoreLabels[k]+'</div>'
        +'<div class="small muted">dari 5</div>'
        +'</div>';
    });
    html += '</div>';

    if(iv.eval.notes){
      html += '<div class="card-flat"><div class="eyebrow" style="margin-bottom:6px;font-size:11px;">Catatan Interview</div>'
        +'<div class="small" style="line-height:1.75;white-space:pre-wrap;color:var(--ink);">'+escapeHtml(iv.eval.notes)+'</div></div>';
    }
  }

  html += '</div>';
  return html;
}

/* ---- Tab: Background Check ---- */
function _bgTpl(nm, pos, refName){
  return 'Kepada Yth.\n'+refName+',\n\nPerkenalkan, kami dari Tim Rekrutmen PT Lintas Maritim Indonesia.\n\n'
    +'Saat ini kami sedang memproses lamaran dari '+nm+' untuk posisi '+pos+'. '
    +'Beliau mencantumkan nama Bapak/Ibu sebagai referensi profesional.\n\n'
    +'Mohon kesediaan Bapak/Ibu menjawab beberapa pertanyaan berikut:\n\n'
    +'1. Bagaimana performa dan etos kerja '+nm+' selama bersama Bapak/Ibu?\n'
    +'2. Apa kelebihan utama yang beliau tunjukkan di lingkungan kerja?\n'
    +'3. Apakah ada area yang menurut Bapak/Ibu perlu ditingkatkan?\n'
    +'4. Apakah Bapak/Ibu akan merekomendasikan beliau untuk bekerja kembali (eligible rehire)?\n'
    +'5. Apakah ada informasi lain yang penting untuk kami ketahui?\n\n'
    +'Informasi yang Bapak/Ibu berikan bersifat rahasia dan hanya digunakan untuk keperluan evaluasi rekrutmen internal.\n\n'
    +'Terima kasih atas waktu dan kerjasamanya.\n\nHormat kami,\nTim Rekrutmen\nPT Lintas Maritim Indonesia\nrecruitment@lintasmaritim.com';
}

function hrBgCopyTemplate(refNum, cid){
  const tpl = document.getElementById('hr-bg-tpl'+refNum);
  const text = tpl ? tpl.value : '';
  if(!text){ toast('Template tidak ditemukan.','','info'); return; }
  navigator.clipboard.writeText(text).then(()=>toast('Template disalin ke clipboard.','success','check'));
}

function hrBgOpenMailto(refNum, cid){
  const c = CANDIDATES.find(x=>x.id===cid); if(!c) return;
  const nm  = c.name||'Kandidat';
  const pos = c.jobTitle||'posisi yang dilamar';
  const emailEl = document.getElementById(refNum===1?'hr-bg-r1e':'hr-bg-r2e');
  const tpl     = document.getElementById('hr-bg-tpl'+refNum);
  const toEmail = emailEl?.value||'';
  const body    = tpl ? tpl.value : _bgTpl(nm, pos, 'Bapak/Ibu');
  const subj    = encodeURIComponent('Pengecekan Referensi — '+nm+' untuk Posisi '+pos);
  window.open('mailto:'+toEmail+'?subject='+subj+'&body='+encodeURIComponent(body));
  if(toEmail){ toast('Membuka email client...','success','send'); } else { toast('Isi email referensi terlebih dahulu.','','info'); }
}

function _bgContactBadge(status){
  if(status==='balas') return '<span style="font-size:10px;padding:2px 7px;border-radius:99px;background:rgba(25,135,84,.12);color:var(--green-dark);font-weight:600;">Sudah Balas</span>';
  if(status==='email') return '<span style="font-size:10px;padding:2px 7px;border-radius:99px;background:rgba(13,110,253,.1);color:#0d6efd;font-weight:600;">Email Terkirim</span>';
  if(status==='wa')    return '<span style="font-size:10px;padding:2px 7px;border-radius:99px;background:rgba(25,135,84,.1);color:var(--green-dark);font-weight:600;">WA Terkirim</span>';
  return '<span style="font-size:10px;padding:2px 7px;border-radius:99px;background:var(--hull-2);color:var(--hr-text-soft);font-weight:600;">Belum Dihubungi</span>';
}

function _bgRefCard(bg, num){
  const n = bg['ref'+num+'Name']||''; const e = bg['ref'+num+'Email']||''; const p = bg['ref'+num+'Phone']||'';
  const s = bg['ref'+num+'ContactStatus']||'belum'; const r = bg['ref'+num+'Result']||'';
  if(!n) return '';
  let h = '<div style="background:var(--hull-2);border:1px solid var(--bridge-line);border-radius:10px;padding:14px;margin-bottom:10px;">';
  h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">';
  h += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--hr-text-soft);">Referensi '+num+'</div>';
  h += _bgContactBadge(s)+'</div>';
  h += '<div style="font-weight:600;font-size:13px;margin-bottom:4px;">'+escapeHtml(n)+'</div>';
  if(e||p){
    h += '<div class="small muted" style="margin-bottom:8px;">';
    if(e) h += icon('send',10)+' <a href="mailto:'+escapeHtml(e)+'" style="color:var(--teal);">'+escapeHtml(e)+'</a>';
    if(e&&p) h += ' &nbsp;·&nbsp; ';
    if(p) h += icon('user',10)+' '+escapeHtml(p);
    h += '</div>';
  }
  if(r) h += '<div style="background:var(--hull-1);border-radius:6px;padding:10px;font-size:12px;line-height:1.65;color:var(--hr-text);">'+escapeHtml(r)+'</div>';
  h += '</div>';
  return h;
}

function _bgRefForm(bg, num, nm, pos){
  const p = num===1?'1':'2';
  const opt = s => v => '<option value="'+v+'"'+(bg['ref'+p+'ContactStatus']===v?' selected':'')+'>'+s+'</option>';

  h += '<div class="eyebrow" style="margin-bottom:12px;">'+icon('user',11)+' Referensi '+p+(num===2?' <span class="small muted" style="text-transform:none;font-weight:400;">(opsional)</span>':'')+'</div>';
  h += '<div class="grid-3" style="margin-bottom:12px;">';
  h += '<div class="field"><label>Nama &amp; Jabatan</label><input class="input" id="hr-bg-r'+p+'n" placeholder="Nama + jabatan / relasi" value="'+escapeHtml(bg['ref'+p+'Name']||'')+'"></div>';
  h += '<div class="field"><label>Email</label><input class="input" type="email" id="hr-bg-r'+p+'e" placeholder="email@domain.com" value="'+escapeHtml(bg['ref'+p+'Email']||'')+'"></div>';
  h += '<div class="field"><label>No. HP / WA</label><input class="input" id="hr-bg-r'+p+'p" placeholder="08xx..." value="'+escapeHtml(bg['ref'+p+'Phone']||'')+'"></div>';

  h += '<option value="belum"'+(!bg['ref'+p+'ContactStatus']||bg['ref'+p+'ContactStatus']==='belum'?' selected':'')+'>Belum dihubungi</option>';
  h += '<option value="email"'+(bg['ref'+p+'ContactStatus']==='email'?' selected':'')+'>Email terkirim, menunggu balasan</option>';
  h += '<option value="wa"'+(bg['ref'+p+'ContactStatus']==='wa'?' selected':'')+'>WA terkirim, menunggu balasan</option>';
  h += '<option value="balas"'+(bg['ref'+p+'ContactStatus']==='balas'?' selected':'')+'>Sudah dapat balasan</option>';
  h += '</select></div>';
  h += '<div class="field"><label>Hasil / Catatan dari Referensi</label><input class="input" id="hr-bg-r'+p+'r" placeholder="Ringkasan balasan referensi" value="'+escapeHtml(bg['ref'+p+'Result']||'')+'"></div>';
  h += '</div>';
  // Template email panel

  h += '<textarea id="hr-bg-tpl'+p+'" class="textarea" style="font-size:11.5px;line-height:1.7;min-height:120px;max-height:180px;resize:vertical;width:100%;box-sizing:border-box;font-family:inherit;">'+tplEsc+'</textarea>';
  h += '<div style="display:flex;gap:8px;margin-top:8px;">';
  h += '<button class="btn btn-ghost btn-sm" onclick="hrBgCopyTemplate('+num+',\''+'{CID}\')">'+icon('copy',11)+' Salin Template</button>';
  h += '<button class="btn btn-ghost btn-sm" onclick="hrBgOpenMailto('+num+',\''+'{CID}\')">'+icon('send',11)+' Kirim via Email Client</button>';
  h += '</div></div>';
  h += '</div>';
  return h;
}

function hrTabBgCheck(c){
  const bg = c.hr.bgCheck;
  const nm  = c.name||'Kandidat';
  const pos = c.jobTitle||'posisi yang dilamar';
  let html = hrPipelineStrip(c);

  if(!bg.done){
    // Notice
    html += '<div class="card-flat" style="margin-bottom:14px;background:rgba(200,130,31,.07);border-color:rgba(200,130,31,.2);">'
      +'<div class="small" style="line-height:1.65;">'+icon('info',12)+' <b>Bagian ini eksklusif HR</b> — data tidak ditampilkan ke kandidat. '
      +'Isi informasi kontak referensi, kirim template email, dan catat hasilnya di sini.</div></div>';

    // Reference forms (replace CID placeholder with actual id)
    html += _bgRefForm(bg,1,nm,pos).split('{CID}').join(c.id);
    html += _bgRefForm(bg,2,nm,pos).split('{CID}').join(c.id);

    // Riwayat kerja
    html += '<div class="card" style="margin-bottom:14px;">';
    html += '<div class="eyebrow" style="margin-bottom:12px;">'+icon('file',11)+' Riwayat Kerja Terakhir yang Dikonfirmasi</div>';
    html += '<div class="grid-2" style="margin-bottom:12px;">';

    html += '<div class="field"><label>Jabatan Terakhir</label><input class="input" id="hr-bg-lpos" placeholder="misal: Staff Keuangan, Deck Officer..." value="'+escapeHtml(bg.lastPosition||'')+'"></div>';
    html += '</div>';
    html += '<div class="grid-3" style="margin-bottom:12px;">';
    html += '<div class="field"><label>Periode Dari</label><input class="input" type="month" id="hr-bg-pfrom" value="'+escapeHtml(bg.periodFrom||'')+'"></div>';
    html += '<div class="field"><label>Periode Sampai</label><input class="input" type="month" id="hr-bg-pto" value="'+escapeHtml(bg.periodTo||'')+'"></div>';
    html += '<div class="field"><label>Total Durasi</label><input class="input" id="hr-bg-ten" placeholder="misal: 2 tahun 4 bulan" value="'+escapeHtml(bg.lastTenure||'')+'"></div>';
    html += '</div>';
    html += '<div class="field" style="margin-bottom:12px;"><label>Alasan Resign / Keluar (hasil konfirmasi)</label>';
    html += '<textarea class="textarea" id="hr-bg-res" style="min-height:56px;" placeholder="Sesuai keterangan referensi / konfirmasi perusahaan...">'+escapeHtml(bg.resignReason||'')+'</textarea></div>';
    html += '<div class="field"><label>Eligible Rehire?</label><select class="select" id="hr-bg-reh">';
    html += '<option value="">Pilih...</option>';
    html += '<option value="Ya"'+(bg.rehire==='Ya'?' selected':'')+'>Ya — direkomendasikan kembali</option>';
    html += '<option value="Tidak"'+(bg.rehire==='Tidak'?' selected':'')+'>Tidak — tidak disarankan</option>';
    html += '<option value="Pertimbangan"'+(bg.rehire==='Pertimbangan'?' selected':'')+'>Dengan Pertimbangan</option>';
    html += '</select></div>';
    html += '</div>';

    html += '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">'
      +'<button class="btn btn-primary btn-sm" onclick="hrSaveBgCheck(\''+c.id+'\')">'+icon('check',13)+' Simpan &amp; Tandai Selesai</button>'
      +'<button class="btn btn-demo btn-sm" onclick="hrDemoSkip(\''+c.id+'\',\'bgcheck\')" title="Demo: isi semua field otomatis">⚡ Demo Auto-fill</button>'
      +'</div>';

  } else {
    // Done state
    const rehireCol = bg.rehire==='Ya'?'var(--green-dark)':bg.rehire==='Tidak'?'var(--red)':'var(--amber)';
    const rehireIcon = bg.rehire==='Ya'?icon('check',11):bg.rehire==='Tidak'?icon('x',11):icon('clock',11);

    html += '<div class="card">';
    html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">'
      +'<span class="tag tag-rule">'+icon('check',11)+' Background Check Selesai</span>';
    if(bg.companyName) html += '<span class="small muted">'+escapeHtml(bg.companyName)+(bg.lastPosition?' · '+escapeHtml(bg.lastPosition):'')+'</span>';
    html += '</div>';

    // Reference cards
    html += _bgRefCard(bg,1);
    if(bg.ref2Name) html += _bgRefCard(bg,2);

    // Summary row
    html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;margin-top:4px;">';
    html += '<div style="background:var(--hull-2);border:1px solid var(--bridge-line);border-radius:10px;padding:12px;">'

      +'<div style="font-weight:600;font-size:13px;">'+escapeHtml(bg.companyName||'—')+'</div></div>';

      +'<div style="font-weight:600;font-size:13px;">'+escapeHtml(bg.lastTenure||'—')+'</div>'
